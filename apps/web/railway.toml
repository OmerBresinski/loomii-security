[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"
watchPatterns = ["apps/web/**", "packages/shared/**", "package.json", "bun.lock", "turbo.json"]

[deploy]
startCommand = "bun run apps/web/dist/index.js"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
