# ===========================================
# Loomii - Local Development Infrastructure
# ===========================================
# Start with: docker compose up -d
# Then run apps directly: bunx turbo dev
#
# Postgres: localhost:5432 (pgvector enabled)
# Redis:    localhost:6379

services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: loomii
      POSTGRES_PASSWORD: loomii_dev
      POSTGRES_DB: loomii
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loomii -d loomii"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
